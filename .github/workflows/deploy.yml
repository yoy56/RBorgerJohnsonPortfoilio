#Google Gemini (https://dev.to/rodrigocastro_o/publishing-your-flutter-apps-into-github-pages-1l61)
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web App
        run: |
          # 1. Build the web app normally
          flutter build web --release --base-href /RBorgerJohnsonPortfoilio/
          
          # 2. Tell GitHub Pages not to process this build with Jekyll
          touch build/web/.nojekyll
          
          # 3. Check for the nested assets bug and flatten it if it exists
          if [ -d "build/web/assets/assets" ]; then
            echo "Nested assets folder detected. Flattening directory structure..."
            cp -r build/web/assets/assets/* build/web/assets/
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
