#Google Gemini (https://dev.to/rodrigocastro_o/publishing-your-flutter-apps-into-github-pages-1l61)
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # 1. Force checkout of real Git LFS images if you use them

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web App
        run: |
          flutter build web --release --base-href /RBorgerJohnsonPortfoilio/
          # 2. Prevent the deploy action from accidentally ignoring your assets
          rm -f build/web/.gitignore 
          touch build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
